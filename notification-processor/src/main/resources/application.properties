spring.application.name=Notification-service
server.port=8082
# Oracle Database Configuration
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/xepdb1
spring.datasource.username=app_user
spring.datasource.password=app_pass
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
kafka.ingest.topic=notification.ingest
kafka.audit.topic=notification.audit
kafka.enrichment.topic=notification.enrichment
# Kafka Broker configuration
spring.kafka.bootstrap-servers=localhost:9092

# Kafka Consumer
spring.kafka.consumer.group-id=INGESTION_PROCESSOR_GROUP
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=com.notification.common.event
spring.kafka.consumer.properties.spring.json.value.default.type=com.notification.common.event.NotificationCreatedEvent